<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>જય મુરલીધર ટ્રેક્ટર - હિસાબ</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f4f8; padding: 10px; direction: ltr; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); max-width: 550px; margin: auto; border-top: 8px solid #e65100; }
        .header { text-align: center; margin-bottom: 15px; }
        .header img { width: 100%; max-width: 180px; border-radius: 10px; }
        h1 { color: #e65100; margin: 5px 0; font-size: 24px; }
        
        .section { background: #fff8f0; padding: 15px; border-radius: 10px; border: 1px solid #ffe0b2; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 15px; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
        
        .add-work-box { display: flex; gap: 5px; margin-top: 5px; }
        .add-btn { background: #2e7d32; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .btn-calc { background: #e65100; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 18px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th { background: #e65100; color: white; padding: 10px; font-size: 15px; }
        td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 15px; }
        
        .total-display { text-align: right; margin-top: 15px; font-size: 22px; color: #1b5e20; font-weight: bold; padding: 10px; border-top: 2px solid #eee; }
        
        @media print {
            .no-print { display: none; }
            .card { box-shadow: none; border: none; max-width: 100%; }
            .btn-calc { display: none; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="https://i.imgur.com/8Q4N7zT.png" alt="Eicher 485">
        <h1>🚩 જય મુરલીધર ટ્રેક્ટર</h1>
        <p style="font-weight:bold; color:#555;">ગઢડા
          , ગુજરાત</p>
    </div>

    <div class="section">
